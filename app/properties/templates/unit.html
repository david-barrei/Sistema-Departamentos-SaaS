{% extends "base.html" %}

  {% block contenido %}
   
  <div class="container-fluid">

    <div class="card card-primary">

        <div class="card-header">
            <h3 class="card-title">
                <i class="fas fa-building mr-1"></i>
                Crear Suite
            </h3>
        </div>

        <form method="post">

            {% csrf_token %}

            <div class="card-body">
                <div class="form-group">
                    <label>Codigo</label>
                    {{ form.code }}
                </div>

                <div class="form-group">
                    <label>Dirección</label>
                    {{ form.floor }}
                </div>

                <div class="form-group">
                    <label>Cuartos</label>
                    {{ form.bedrooms }}
                </div>

                <div class="form-group">
                    <label>Baños</label>
                    {{ form.bathrooms }}
                </div>

                <div class="form-group">
                    <label>Area m2</label>
                    {{ form.area_m2 }}
                </div>

            </div>

            <div class="card-footer">

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i>
                    Guardar
                </button>

                <a href="{% url 'properties:building_list' %}" class="btn btn-secondary">
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</div>

     {% endblock contenido %}
