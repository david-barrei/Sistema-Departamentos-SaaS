

services:
  web:
    build: . 
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000
    #command: sh -c "python manage.py collectstatic --noinput && gunicorn app.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/code
      - static_volume:/code/static_root
      - ./media:/code/media

    depends_on:
      db:
        condition: service_healthy
 
    env_file:
      - .env
    restart: always
    networks:
      - webnet

  db:
    image: postgres:15
    volumes:
      - ../datos:/var/lib/postgresql/data/

    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
        - webnet

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/code/static_root
      - ./media:/code/media
    depends_on:
      - web
    networks:
      - webnet

networks:
  webnet:

volumes:
  static_volume:
  #media_data:

     








