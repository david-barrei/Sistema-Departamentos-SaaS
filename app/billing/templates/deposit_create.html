{% extends "base.html"%}

{% block contenido %}
    
<div class="container-fluid">

    <div class="card card-primary">

        <div class="card-header">
            <h3 class="card-title">
                <i class="fas fa-user-plus text-orange mr-1"></i>
                Registrar Garantía
            </h3>
        </div>

        <form method="post">

            {% csrf_token %}

            <div class="card-body">


                <div class="form-group">
                    <label>Garantia</label>
                    {{ form.amount }}
                </div>

                <div class="form-group">
                    <label>Fecha de Recepción</label>
                    {{ form.received_at }}
                </div>

                <div class="form-group">
                    <label>Fecha de Devolución</label>
                    {{ form.returned_at }}
                </div>
                
                <div class="form-group">
                    <label>Monto devuelto</label>
                    {{ form.returned_amount }}
                </div>

                <div class="form-group">
                    <label>Notas</label>
                    {{ form.notes }}
                </div>

            </div>

            <div class="card-footer">

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i>
                    Guardar
                </button>

                <a href="{% url 'lease:lease_detail' lease_id=lease.id%}" class="btn btn-secondary">
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</div>



{% endblock %}
