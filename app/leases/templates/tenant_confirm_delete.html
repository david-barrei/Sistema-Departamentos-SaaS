

{% extends "base.html" %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-danger card-outline">
            <div class="card-header">
                <h3 class="card-title">Confirmar Eliminación</h3>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
                <p>¿Está seguro de que desea eliminar al inquilino <strong>{{ object.full_name }}</strong>?</p>
                <p class="text-muted small">Esta acción no se puede deshacer si el inquilino no tiene historial.</p>
            </div>
            <div class="card-footer">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Sí, eliminar permanentemente</button>
                    <a href="{% url 'lease:tenant_list' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
