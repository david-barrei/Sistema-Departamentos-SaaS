
{% extends "base.html" %}

{% block content-header %}
    {% with breadcrumb_title="Listado Grupos "%}
        {{ block.super }}
    {% endwith %}
{% endblock %}

{% block contenido %}
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                <div class="card-tools">
                    <a href="{% url "users:groups_add" %} " class="btn btn-tool"> <i class="fas fa-user-plus text-info"> </i></a>
                    <button type="button" class="btn btn-tool" data-card-widget="maximize"><i class="fas fa-expend"> </i>
                    </button>
                </div>
            </div>
            <div class="card-body">
                <table id="tbl" class="table table-bordered table-striped">
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Name</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for i in obj %}
                    <tr>
                        <td>{{i.id}}</td>
                        <td>{{i.name}}  </td>
                        <td>
                            <a href="{% url "users:groups_modify" i.id %} " class="btn btn-sm text-success"> <i class="fas fa-edit"> </i></a>
                        </td>
                    </tr>
                    {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

{% endblock %}
